<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step Zero Studio</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #111;
            color: #f5f5f5;
            font-family: "EB Garamond";

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
        }

        main {
            max-width: 700px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.25rem;
            letter-spacing: 0.08em;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: normal;
            color: #888;
            margin-top: 0;
            margin-bottom: 2rem;
        }

        p {
            line-height: 1.7;
            color: #cccccc;
        }

        footer {
            margin-top: 3rem;
            color: #666;
            font-size: 0.9rem;
        }

        hr {
            margin: 2.5rem auto;
            width: 80px;
            border: none;
            border-top: 1px solid #333;
        }
    </style>
</head>

<body>

<main>

    <h1>STEP ZERO</h1>

    <h2>Studio</h2>

    <hr>

    <p>
        Step Zero Studio is currently under construction.
    </p>

    <footer>
        © 2026 Step Zero LLC
    </footer>

</main>

</body>
</html>
